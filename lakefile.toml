name = "erdos_problems"
keywords = ["math"]
defaultTargets = ["ErdosProblems"]

[leanOptions]
pp.unicode.fun = true
autoImplicit = false
relaxedAutoImplicit = false

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.28.0"

[[lean_lib]]
name = "ErdosProblems"
globs = ["ErdosProblems.+"]
leanOptions = { warn.sorry = false }
