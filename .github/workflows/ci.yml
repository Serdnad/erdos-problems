name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Lean
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: .
          build: true
